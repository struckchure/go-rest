components:
    schemas:
        LoginRequest:
            properties:
                device:
                    type: string
                email:
                    type: string
                nonce:
                    type: string
                password:
                    type: string
                remember:
                    type: boolean
                scopes:
                    items:
                        type: string
                    type: array
            required:
                - email
                - password
                - nonce
            type: object
        LoginResponse:
            properties:
                accessToken:
                    type: string
                issuedAt:
                    format: date-time
                    type: string
            required:
                - accessToken
                - issuedAt
            type: object
        SearchRequest:
            properties:
                any:
                    items:
                        enum:
                            - active
                            - archived
                        type: string
                    type: array
                colour:
                    enum:
                        - red
                        - green
                        - blue
                    type: string
                priority:
                    enum:
                        - 1
                        - 2
                        - 3
                    type: integer
                status:
                    enum:
                        - active
                        - archived
                    type: string
                was:
                    enum:
                        - active
                        - archived
                    type: string
            required:
                - status
                - priority
                - colour
            type: object
        User:
            properties:
                email:
                    type: string
                id:
                    type: string
            required:
                - id
                - email
            type: object
    securitySchemes:
        apiKey:
            in: header
            name: X-API-Key
            type: apiKey
        bearerAuth:
            bearerFormat: JWT
            scheme: bearer
            type: http
info:
    title: Test API
    version: 1.0.0
openapi: 3.0.3
paths:
    /api/user/:
        get:
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: '#/components/schemas/User'
                                type: array
                    description: OK
            security:
                - apiKey: []
    /api/user/{id}:
        get:
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                    type: string
                - in: query
                  name: page
                  required: true
                  schema:
                    type: integer
                - in: query
                  name: include
                  schema:
                    type: string
                - in: query
                  name: cursor
                  schema:
                    type: string
                - in: header
                  name: X-Trace-Id
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/User'
                    description: OK
            security:
                - bearerAuth: []
    /api/user/authenticate/:
        post:
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/LoginRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/LoginResponse'
                    description: OK
            summary: Authenticate a user
    /api/user/search/:
        post:
            parameters:
                - in: query
                  name: sort
                  required: true
                  schema:
                    enum:
                        - asc
                        - desc
                    type: string
                - in: query
                  name: kinds
                  schema:
                    items:
                        enum:
                            - a
                            - b
                        type: string
                    type: array
                - in: query
                  name: mode
                  required: true
                  schema:
                    enum:
                        - active
                        - archived
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SearchRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: '#/components/schemas/User'
                                type: array
                    description: OK
